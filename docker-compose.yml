networks:
  retail_network:
    driver: bridge

services:
  # 1. SQL SERVER NGUỒN (OLTP - Tự động Restore từ file .bak)
  sqlserver-source:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_source_oltp
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLSERVER_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - ./mssql-init:/var/opt/mssql/backup
    networks:
      - retail_network

  # 2. HỆ THỐNG LƯU TRỮ DATA LAKE (MINIO) - Nơi chứa file Parquet tầng Bronze & Silver
  minio:
    image: minio/minio
    container_name: minio_data_lake
    ports:
      - "9000:9000"       # Cổng để Spark kết nối đẩy dữ liệu vào
      - "9001:9001"       # Cổng vào giao diện Web UI
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      # Ánh xạ thư mục storage local vào MinIO để giữ lại file dữ liệu trên máy thật ổ E
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - retail_network

  # 3. POSTGRES ĐÍCH (DATA WAREHOUSE GOLD)
  postgres-gold:
    image: postgres:15
    container_name: postgres_gold_dw
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: adventureworks_dw
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - retail_network

  # 4. TOOL GIAO DIỆN QUẢN LÝ DATABASE (PGADMIN - Bản fix lỗi quyền Windows)
  pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: pgadmin_web
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"         # Đổi sang cổng 5050 thần thánh chống xung đột
    depends_on:
      - postgres-gold
    volumes:
      - pgadmin_data:/var/lib/pgadmin   # Đút vào hộp đen Docker để né lỗi NTFS Windows
    networks:
      - retail_network

  # 5. ENGINE TÍNH TOÁN PHÂN TÁN (SPARK MASTER - Bản chính chủ Apache)
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark_master_engine
    hostname: spark-master-engine   # Fix lỗi "hostname can't be fully qualified" (dùng - thay _ vì RFC 1123)
    user: root            # Ép quyền root để thoải mái đọc ghi mapping ra ổ E máy thật
    environment:
      - SPARK_MODE=master
      # Credentials đọc từ file .env → spark-defaults.conf dùng ${MINIO_ACCESS_KEY} etc.
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD}
    ports:
      - "7077:7077"
      - "8081:8080"       # Web UI check log Spark
    volumes:
      - ./jars:/opt/spark/custom_jars
      - ./scripts:/opt/spark/scripts
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    networks:
      - retail_network

  # 6. SPARK WORKER - Executor thật sự xử lý data (Master chỉ điều phối)
  spark-worker:
    image: apache/spark:3.5.0
    container_name: spark_worker_1
    hostname: spark-worker-1
    user: root
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master-engine:7077
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
    depends_on:
      - spark-master
    volumes:
      - ./jars:/opt/spark/custom_jars
      - ./spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master-engine:7077
    networks:
      - retail_network

  # 7. STREAMLIT DASHBOARD
  streamlit-app:
    image: python:3.9-slim
    container_name: streamlit_dashboard
    env_file: .env
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app
      - ./requirements.txt:/app/requirements.txt
    command: >
      sh -c "pip install --no-cache-dir -r /app/requirements.txt &&
             streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      - postgres-gold
    networks:
      - retail_network

  # 8. AIRFLOW — Khởi tạo DB & user admin (chỉ chạy 1 lần)
  # FIX: Dùng PostgreSQL thay SQLite → tránh lỗi "database is locked"
  airflow-init:
    image: apache/airflow:2.9.1
    container_name: airflow_init
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-gold:5432/airflow_meta
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: 'mfYeKqGxQO0i-B0ItFh4mfXJ7HHEiVkHfhSSFAqLjLQ='
      AIRFLOW__WEBSERVER__SECRET_KEY: 'adventureworks_secret_2024'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@admin.com || true
      "
    depends_on:
      - postgres-gold
    networks:
      - retail_network

  # 9. AIRFLOW WEBSERVER — Giao diện UI quản lý DAG
  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: airflow_webserver
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-gold:5432/airflow_meta
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: 'mfYeKqGxQO0i-B0ItFh4mfXJ7HHEiVkHfhSSFAqLjLQ='
      AIRFLOW__WEBSERVER__SECRET_KEY: 'adventureworks_secret_2024'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "8080:8080"
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
    command: airflow webserver
    depends_on:
      - airflow-init
      - postgres-gold
    restart: on-failure
    networks:
      - retail_network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 10. AIRFLOW SCHEDULER — Daemon lắng nghe & trigger DAG
  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: airflow_scheduler
    env_file: .env
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres-gold:5432/airflow_meta
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: 'mfYeKqGxQO0i-B0ItFh4mfXJ7HHEiVkHfhSSFAqLjLQ='
      AIRFLOW__WEBSERVER__SECRET_KEY: 'adventureworks_secret_2024'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      SQLSERVER_PASSWORD: ${SQLSERVER_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
    command: airflow scheduler
    depends_on:
      - airflow-init
      - postgres-gold
    restart: on-failure
    networks:
      - retail_network

volumes:
  pgadmin_data:
  minio_data:
  airflow_data: