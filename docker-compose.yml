networks:
  retail_network:
    driver: bridge

services:
  # 1. SQL SERVER NGUỒN (OLTP - Tự động Restore từ file .bak)
  sqlserver-source:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver_source_oltp
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "AdminPassword123!"
    ports:
      - "1433:1433"
    volumes:
      - ./mssql-init:/var/opt/mssql/backup
    networks:
      - retail_network

  # 2. HỆ THỐNG LƯU TRỮ DATA LAKE (MINIO) - Nơi chứa file Parquet tầng Bronze & Silver
  minio:
    image: minio/minio
    container_name: minio_data_lake
    ports:
      - "9000:9000"       # Cổng để Spark kết nối đẩy dữ liệu vào
      - "9001:9001"       # Cổng vào giao diện Web UI
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword
    volumes:
      # Ánh xạ thư mục storage local vào MinIO để giữ lại file dữ liệu trên máy thật ổ E
      - ./storage:/data
    command: server /data --console-address ":9001"
    networks:
      - retail_network

  # 3. POSTGRES ĐÍCH (DATA WAREHOUSE GOLD)
  postgres-gold:
    image: postgres:15
    container_name: postgres_gold_dw
    environment:
      POSTGRES_USER: gold_user
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: adventureworks_dw
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    networks:
      - retail_network

  # 4. TOOL GIAO DIỆN QUẢN LÝ DATABASE (PGADMIN - Bản fix lỗi quyền Windows)
  pgadmin:
    image: dpage/pgadmin4:8.5
    container_name: pgadmin_web
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"         # Đổi sang cổng 5050 thần thánh chống xung đột
    depends_on:
      - postgres-gold
    volumes:
      - pgadmin_data:/var/lib/pgadmin   # Đút vào hộp đen Docker để né lỗi NTFS Windows
    networks:
      - retail_network

  # 5. ENGINE TÍNH TOÁN PHÂN TÁN (SPARK MASTER - Bản chính chủ Apache)
  spark-master:
    image: apache/spark:3.5.0
    container_name: spark_master_engine
    hostname: spark-master-engine   # Fix lỗi "hostname can't be fully qualified" (dùng - thay _ vì RFC 1123)
    user: root            # Ép quyền root để thoải mái đọc ghi mapping ra ổ E máy thật
    environment:
      - SPARK_MODE=master
    ports:
      - "7077:7077"
      - "8081:8080"       # Web UI check log Spark
    volumes:
      - ./bronze:/opt/spark/bronze
      - ./silver:/opt/spark/silver
      - ./gold:/opt/spark/gold
      - ./jars:/opt/spark/custom_jars   # Nơi chứa các thư viện JDBC driver nếu cần
      - ./scripts:/opt/spark/scripts # Nơi chứa các script Spark job nếu cần

    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    
    networks:
      - retail_network

  # 6. STREAMLIT DASHBOARD
  streamlit-app:
    image: python:3.9-slim
    container_name: streamlit_dashboard
    working_dir: /app
    ports:
      - "8501:8501"
    volumes:
      - ./app:/app
      - ./requirements.txt:/app/requirements.txt
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    depends_on:
      - postgres-gold
    networks:
      - retail_network

# Khai báo Named Volume cho pgAdmin ở cuối file
volumes:
  pgadmin_data: